<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Indian Truck Driving - UNBL0CKEDZ0NE</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
    #gameContainer canvas { display:block; }
    div#webgl-content {
      position: absolute;
      top: 50%; left: 50%;
      -webkit-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }
    div#loadingBox {
      width: 100%; height: 0px;
      position: absolute;
      top: 50%; margin-top: 137px;
      text-align: center;
    }
    div#icon {
      width: 300px; height: 310px;

      top: 50%; left: 50%;

      background-repeat: no-repeat;
      box-shadow: 1px 1px 5px #141414;

    div#box {
      width: 328px; height: 367px;

      top: 50%; left: 50%;
      margin-top: -199px; margin-left: -164px;

    div#bgBar {
      display: none;

      left: 50%; height: 18px;

      box-shadow: 1px 1px 5px #111;

    div#progressBar {
      display: none;

      width: 0px; height: 18px;

    p#loadingInfo {
      color: #fff; letter-spacing: 1px;

      top: 50%; font-size: 11px; font-weight: 500;
      margin-top: 140px;
      text-shadow: 0px 0px 5px #000;
    }
    div#spinner {
      position: absolute; height: 18px;
      left: 50%; margin-left: -150px;
      width: 300px; position: relative;
      overflow: hidden; background-color: #882121;
      box-shadow: 1px 1px 5px #111;
    }
    div#spinner:before {
      display: block; position: absolute;
      content: ""; width: 150%; margin-left: -10px;
      height: 10px; background-color: #e85352;
      transform: rotate(-5deg);
      animation: loading 1s linear infinite;
    }
    @keyframes loading {
      from { top: -185% }
      to { top: 225% }
    }
    #copyright-banner {
      position: fixed;
      top: 0; left: 0; right: 0;

      background: linear-gradient(90deg, #111, #1a1a1a);

      padding: 12px 20px;
      letter-spacing: 1px;
      animation: fadeOut 0.6s ease 4.4s forwards;
    }
    #copyright-banner span {
      color: #ff9900;
      text-shadow: 0 0 8px #ff9900;
    }
    #copyright-timer { display: none; }
    @keyframes fadeOut {

  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/UnityLoader.js"></script>
  <script>
    window.mergedBlobUrls = {};

    function mergeFiles(fileParts) {
      return new Promise((resolve, reject) => {
        let buffers = [];
        function fetchPart(i) {
          if (i >= fileParts.length) {
            let mergedBlob = new Blob(buffers);
            let mergedUrl = URL.createObjectURL(mergedBlob);
            resolve(mergedUrl);
            return;
          }
          fetch(fileParts[i])
            .then(r => r.arrayBuffer())
            .then(data => { buffers.push(data); fetchPart(i + 1); })
            .catch(reject);
        }
        fetchPart(0);
      });
    }

    function getParts(file, start, end) {
      let arr = [];
      for (let i = start; i <= end; i++) { arr.push(file + ".part" + i); }
      return arr;
    }

    function resizeUnityContainer() {
      var container = document.getElementById("gameContainer");
      if (container) {
        container.style.width = window.innerWidth + "px";
        container.style.height = window.innerHeight + "px";
      }
    }

    window.addEventListener('resize', resizeUnityContainer);

    function UnityProgress(gameInstance, progress) {
      var container = document.getElementById("gameContainer");
      if (container) document.body.style.background = container.style.background;
      if (!gameInstance.Module) {
        return;
      } else if (progress === "complete") {
        document.getElementById("loadingBox").style.display = "none";
        document.getElementById("icon").style.display = "none";
        document.getElementById("loadingInfo").style.display = "none";
        document.getElementById("box").style.display = "none";
      } else if (progress === 1 || progress === "preinit") {
        document.getElementById("loadingInfo").innerHTML = "PROCESSING...";
        document.getElementById("spinner").style.display = "inherit";
        document.getElementById("bgBar").style.display = "none";
        document.getElementById("progressBar").style.display = "none";
      } else if (progress > 0) {
        document.getElementById("progressBar").style.width = 300 * progress + "px";
        document.getElementById("loadingInfo").innerHTML = Math.round(progress * 100) + "%";
        document.getElementById("spinner").style.display = "none";
        document.getElementById("bgBar").style.display = "block";
        document.getElementById("progressBar").style.display = "inherit";
      }
    }

    (function() {
      var originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        for (let key in window.mergedBlobUrls) {
          if (url.includes(key)) { url = window.mergedBlobUrls[key]; break; }
        }
        return originalOpen.call(this, method, url, ...args);
      };
    })();

    window.addEventListener("load", function () {
      fetch("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.json")
        .then(r => r.json())
        .then(config => {
          return Promise.all([
            mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.data.unityweb", 1, 2)),
            mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.wasm.code.unityweb", 1, 1)),
            mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.wasm.framework.unityweb", 1, 1))
          ]).then(([dataUrl, wasmCodeUrl, wasmFrameworkUrl]) => {
            window.mergedBlobUrls["indian_truck_gd_2_0_1.data.unityweb"] = dataUrl;
            window.mergedBlobUrls["indian_truck_gd_2_0_1.wasm.code.unityweb"] = wasmCodeUrl;
            window.mergedBlobUrls["indian_truck_gd_2_0_1.wasm.framework.unityweb"] = wasmFrameworkUrl;

            config.dataUrl = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.data.unityweb";
            config.wasmCodeUrl = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.wasm.code.unityweb";
            config.wasmFrameworkUrl = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets/truck/Build/indian_truck_gd_2_0_1.wasm.framework.unityweb";

            let blob = new Blob([JSON.stringify(config)], { type: "application/json" });
            let blobUrl = URL.createObjectURL(blob);

            window.gameInstance = UnityLoader.instantiate("gameContainer", blobUrl, {
              onProgress: UnityProgress,
              Module: {
                onRuntimeInitialized: function () {
                  resizeUnityContainer();
                  UnityProgress(window.gameInstance, 'complete');
                },
                preInit: [function() { UnityProgress(window.gameInstance, "preinit"); }]
              }
            });
          });
        })
        .catch(err => {
          console.error("Unity load failed:", err);
          var loadingInfo = document.getElementById("loadingInfo");
          if (loadingInfo) { loadingInfo.innerHTML = "wtf did you do check console bruv"; }
        });
    });
  </script>
</head>

  <script>
    var count = 5;
    var timerEl = document.getElementById("copyright-timer");
    var bannerEl = document.getElementById("copyright-banner");
    var interval = setInterval(function() {
      count--;
      if (timerEl) timerEl.innerText = count;
      if (count <= 0) {
        clearInterval(interval);
        setTimeout(function() {
          if (bannerEl) bannerEl.remove();
        }, 600);
      }
    }, 1000);
  </script>
