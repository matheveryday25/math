<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/fullscreen/mp3.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNBL0CKEDZ0NE — Media Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060606;
      --panel: #0e0e0e;
      --border: #1e1e1e;
      --accent: #ff9900;
      --accent-dim: rgba(255,153,0,0.15);
      --accent-glow: rgba(255,153,0,0.4);
      --text: #e8e8e8;
      --muted: #555;
      --tab-bg: #111;
      --tab-active: #1a1a1a;
      --header-h: 52px;
      --tab-bar-h: 44px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lexend', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h);
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px var(--accent-glow);
      flex: 1;
    }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .track-count {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }

    .btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 18px;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .btn-accent {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .btn-accent:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    /* ── WORKSPACE ── */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT: PLAYER ── */
    .left-panel {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .tab-bar {
      height: var(--tab-bar-h);
      background: var(--tab-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    .tab-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.live { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .status-dot.playing { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

    .panel-body {
      flex: 1;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
    }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-label {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .drop-label .link { color: var(--accent); cursor: pointer; }
    #file-input { display: none; }

    /* ── VIDEO ── */
    .video-wrap {
      display: none;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--border);
    }
    .video-wrap.visible { display: block; }
    #video-el { width: 100%; height: auto; display: block; max-height: 200px; }

    /* ── NOW PLAYING ── */
    .now-playing { display: flex; flex-direction: column; gap: 3px; }

    .np-eyebrow {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .np-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .np-sub {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── PROGRESS ── */
    .progress-area { display: flex; flex-direction: column; gap: 6px; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: height 0.15s;
    }

    input[type="range"]:hover { height: 4px; }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    #vol-bar::-webkit-slider-thumb { background: var(--muted); }
    #vol-bar::-webkit-slider-thumb:hover { background: var(--text); }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, transform 0.1s;
      padding: 6px;
      border-radius: 50%;
    }

    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn.on { color: var(--accent); }

    .play-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
      color: #000;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .play-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .play-btn:active { transform: scale(0.96); }

    /* ── VOLUME ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-icon { color: var(--muted); flex-shrink: 0; }

    /* ── RIGHT: PLAYLIST ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .playlist-output {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .playlist-output::-webkit-scrollbar { width: 4px; }
    .playlist-output::-webkit-scrollbar-track { background: transparent; }
    .playlist-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .playlist-empty {
      padding: 20px 16px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 16px;
      cursor: pointer;
      border-bottom: 1px solid #111;
      transition: background 0.12s;
    }

    .track-item:last-child { border-bottom: none; }
    .track-item:hover { background: var(--tab-active); }
    .track-item.active { background: rgba(255,153,0,0.07); }

    .track-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .track-item.active .track-num { color: var(--accent); }

    .track-type-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      background: var(--tab-active);
      color: var(--muted);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .track-type-badge.video { background: var(--accent-dim); color: var(--accent); }

    .track-name {
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .track-item.active .track-name { color: var(--accent); }

    .track-dur {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    .eq-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
    }

    .eq-bar.anim { animation: eq-bounce 0.55s ease-in-out infinite alternate; }
    .eq-bar:nth-child(2).anim { animation-delay: 0.14s; }
    .eq-bar:nth-child(3).anim { animation-delay: 0.06s; }

    @keyframes eq-bounce {
      from { height: 3px; }
      to   { height: 12px; }
    }

    /* ── FOOTER ── */
    footer {
      height: 26px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    footer .left { display: flex; gap: 16px; align-items: center; }
    footer .sep { color: var(--border); }

    .kbd {
      background: var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚡ Media Player</h1>
    <div class="header-actions">
      <span class="track-count" id="track-count">0 tracks</span>
      <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">+ Add Files</button>
    </div>
  </header>

  <div class="workspace">

    <!-- LEFT: PLAYER CONTROLS -->
    <div class="left-panel">
      <div class="tab-bar">
        <span class="tab-label">Now Playing</span>
        <div class="status-dot" id="statusDot"></div>
      </div>

      <div class="panel-body">

        <!-- Drop zone -->
        <div class="drop-zone" id="drop-zone">
          <div class="drop-label">
            Drop audio / video files here or <span class="link" id="browse-link">browse</span>
          </div>
          <input type="file" id="file-input" multiple accept="audio/*,video/*">
        </div>

        <!-- Video -->
        <div class="video-wrap" id="video-wrap">
          <video id="video-el" preload="metadata"></video>
        </div>

        <!-- Now playing -->
        <div class="now-playing">
          <div class="np-eyebrow">Now playing</div>
          <div class="np-title" id="np-title">—</div>
          <div class="np-sub" id="np-sub">No track loaded</div>
        </div>

        <!-- Progress -->
        <div class="progress-area">
          <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
          <div class="time-row">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button class="ctrl-btn" id="shuffle-btn" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="prev-btn" title="Previous">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
            </svg>
          </button>
          <button class="play-btn" id="play-btn">
            <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="next-btn" title="Next">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="repeat-btn" title="Repeat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
        </div>

        <!-- Volume -->
        <div class="volume-row">
          <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
          <input type="range" id="vol-bar" min="0" max="1" step="0.01" value="0.8">
        </div>

      </div>
    </div>

    <!-- RIGHT: PLAYLIST -->
    <div class="right-panel">
      <div class="tab-bar">
        <span class="tab-label">Playlist</span>
        <span class="track-count" id="track-count-r" style="margin-left:auto;margin-right:8px;"></span>
      </div>
      <div class="playlist-output" id="playlist-output">
        <div class="playlist-empty">Add tracks to get started…</div>
      </div>
    </div>

  </div>

  <footer>
    <div class="left">
      <span>Media Player</span>
      <span class="sep">|</span>
      <span><span class="kbd">Space</span> play/pause</span>
      <span class="sep">|</span>
      <span><span class="kbd">←</span><span class="kbd">→</span> prev/next</span>
    </div>
    <span>made by UNBL0CKEDZ0NE</span>
  </footer>

  <audio id="audio-el"></audio>

  <script>
    const audioEl    = document.getElementById('audio-el');
    const videoEl    = document.getElementById('video-el');
    const videoWrap  = document.getElementById('video-wrap');
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const playBtn    = document.getElementById('play-btn');
    const playIcon   = document.getElementById('play-icon');
    const prevBtn    = document.getElementById('prev-btn');
    const nextBtn    = document.getElementById('next-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const repeatBtn  = document.getElementById('repeat-btn');
    const progressBar= document.getElementById('progress-bar');
    const volBar     = document.getElementById('vol-bar');
    const timeCur    = document.getElementById('time-current');
    const timeTotal  = document.getElementById('time-total');
    const npTitle    = document.getElementById('np-title');
    const npSub      = document.getElementById('np-sub');
    const trackCountEl  = document.getElementById('track-count');
    const trackCountR   = document.getElementById('track-count-r');
    const playlistOut   = document.getElementById('playlist-output');
    const statusDot     = document.getElementById('statusDot');

    let tracks = [], currentIdx = -1, isPlaying = false, shuffle = false, repeat = false;
    let activeMedia = audioEl;

    audioEl.volume = 0.8;
    videoEl.volume = 0.8;

    const fmt = s => {
      if (!isFinite(s)) return '0:00';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    };

    const cleanName = fn => fn.replace(/\.[^.]+$/, '').replace(/[-_]+/g, ' ');
    const isVideoFile = f => f.type.startsWith('video/') || /\.(mp4|webm|ogg|ogv|mov|mkv|avi|m4v|3gp)$/i.test(f.name);

    function setDot(state) {
      statusDot.className = 'status-dot';
      if (state === 'playing') statusDot.classList.add('playing');
      if (state === 'loaded')  statusDot.classList.add('live');
    }

    function addFiles(files) {
      const mediaFiles = Array.from(files).filter(
        f => f.type.startsWith('audio/') || f.type.startsWith('video/') ||
             /\.(mp3|wav|ogg|flac|aac|m4a|opus|webm|mp4|mov|mkv|avi|m4v|3gp|ogv)$/i.test(f.name)
      );
      if (!mediaFiles.length) return;
      mediaFiles.forEach(f => tracks.push({
        file: f, name: cleanName(f.name),
        url: URL.createObjectURL(f), duration: null, isVideo: isVideoFile(f)
      }));
      const t = tracks.length;
      trackCountEl.textContent = t + (t === 1 ? ' track' : ' tracks');
      trackCountR.textContent  = t + (t === 1 ? ' track' : ' tracks');
      renderPlaylist();
      if (currentIdx === -1) loadTrack(0);
    }

    function setActiveMedia(isVideo) {
      activeMedia = isVideo ? videoEl : audioEl;
      videoWrap.classList.toggle('visible', isVideo);
    }

    function loadTrack(idx) {
      if (idx < 0 || idx >= tracks.length) return;
      audioEl.pause(); videoEl.pause();
      currentIdx = idx;
      const track = tracks[idx];
      setActiveMedia(track.isVideo);
      activeMedia.src = track.url;
      activeMedia.volume = parseFloat(volBar.value);
      npTitle.textContent = track.name;
      npSub.textContent = track.isVideo ? 'video file' : (track.file.type || 'audio file');
      progressBar.value = 0;
      timeCur.textContent = '0:00';
      timeTotal.textContent = '0:00';
      setDot('loaded');
      renderPlaylist();
      if (isPlaying) activeMedia.play();
    }

    function renderPlaylist() {
      if (!tracks.length) {
        playlistOut.innerHTML = '<div class="playlist-empty">Add tracks to get started…</div>';
        return;
      }
      playlistOut.innerHTML = '';
      tracks.forEach((t, i) => {
        const el = document.createElement('div');
        el.className = 'track-item' + (i === currentIdx ? ' active' : '');

        const numEl = document.createElement('div');
        numEl.className = 'track-num';
        if (i === currentIdx) {
          const eq = document.createElement('div');
          eq.className = 'equalizer';
          [0,1,2].forEach(b => {
            const bar = document.createElement('div');
            bar.className = 'eq-bar' + (isPlaying ? ' anim' : '');
            bar.style.height = '4px';
            bar.style.animationDelay = (b * 0.14) + 's';
            eq.appendChild(bar);
          });
          numEl.appendChild(eq);
        } else {
          numEl.textContent = i + 1;
        }

        const badge = document.createElement('div');
        badge.className = 'track-type-badge' + (t.isVideo ? ' video' : '');
        badge.textContent = t.isVideo ? 'VID' : 'AUD';

        const nameEl = document.createElement('div');
        nameEl.className = 'track-name';
        nameEl.textContent = t.name;

        const durEl = document.createElement('div');
        durEl.className = 'track-dur';
        durEl.textContent = t.duration ? fmt(t.duration) : '—';

        el.append(numEl, badge, nameEl, durEl);
        el.addEventListener('click', () => { isPlaying = true; loadTrack(i); activeMedia.play(); updatePlayIcon(); });
        playlistOut.appendChild(el);
      });
    }

    function updatePlayIcon() {
      playIcon.innerHTML = isPlaying
        ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
        : '<polygon points="5 3 19 12 5 21 5 3"/>';
      setDot(isPlaying ? 'playing' : 'loaded');
    }

    function nextTrack() {
      if (!tracks.length) return;
      let idx;
      if (shuffle) { do { idx = Math.floor(Math.random() * tracks.length); } while (tracks.length > 1 && idx === currentIdx); }
      else { idx = (currentIdx + 1) % tracks.length; }
      isPlaying = true; loadTrack(idx); activeMedia.play(); updatePlayIcon();
    }

    [audioEl, videoEl].forEach(el => {
      el.addEventListener('timeupdate', () => {
        if (el !== activeMedia || !isFinite(el.duration)) return;
        progressBar.value = (el.currentTime / el.duration) * 100;
        timeCur.textContent = fmt(el.currentTime);
      });
      el.addEventListener('loadedmetadata', () => {
        if (el !== activeMedia) return;
        if (currentIdx >= 0) tracks[currentIdx].duration = el.duration;
        timeTotal.textContent = fmt(el.duration);
        renderPlaylist();
      });
      el.addEventListener('ended', () => {
        if (el !== activeMedia || repeat) return;
        if (currentIdx < tracks.length - 1 || shuffle) { nextTrack(); }
        else { isPlaying = false; updatePlayIcon(); renderPlaylist(); }
      });
    });

    playBtn.addEventListener('click', () => {
      if (!tracks.length) return;
      if (currentIdx === -1) loadTrack(0);
      if (isPlaying) { activeMedia.pause(); isPlaying = false; }
      else { activeMedia.play(); isPlaying = true; }
      updatePlayIcon(); renderPlaylist();
    });

    prevBtn.addEventListener('click', () => {
      if (!tracks.length) return;
      if (activeMedia.currentTime > 3) { activeMedia.currentTime = 0; return; }
      const idx = currentIdx > 0 ? currentIdx - 1 : tracks.length - 1;
      isPlaying = true; loadTrack(idx); activeMedia.play(); updatePlayIcon();
    });

    nextBtn.addEventListener('click', nextTrack);

    shuffleBtn.addEventListener('click', () => { shuffle = !shuffle; shuffleBtn.classList.toggle('on', shuffle); });
    repeatBtn.addEventListener('click', () => {
      repeat = !repeat;
      audioEl.loop = repeat; videoEl.loop = repeat;
      repeatBtn.classList.toggle('on', repeat);
    });

    progressBar.addEventListener('input', () => {
      if (isFinite(activeMedia.duration))
        activeMedia.currentTime = (progressBar.value / 100) * activeMedia.duration;
    });

    volBar.addEventListener('input', () => { audioEl.volume = volBar.value; videoEl.volume = volBar.value; });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over'); });
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });

    document.getElementById('browse-link').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => addFiles(fileInput.files));

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
      if (e.code === 'ArrowLeft') prevBtn.click();
      if (e.code === 'ArrowRight') nextBtn.click();
    });
  </script>

</body>
</html>
