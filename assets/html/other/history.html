<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>History Flooder v0.3 — UNBL0CKEDZ0NE</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060606;
      --panel: #0e0e0e;
      --border: #1e1e1e;
      --accent: #ff9900;
      --accent-dim: rgba(255,153,0,0.15);
      --accent-glow: rgba(255,153,0,0.4);
      --text: #e8e8e8;
      --muted: #555;
      --tab-bg: #111;
      --tab-active: #1a1a1a;
      --header-h: 52px;
      --tab-bar-h: 44px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lexend', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: var(--header-h);
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px var(--accent-glow);
      flex: 1;
    }

    .header-actions { display: flex; gap: 10px; }

    .btn {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: 'Lexend', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 18px;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-accent {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .btn-accent:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    /* ── WORKSPACE ── */
    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .tab-bar {
      height: var(--tab-bar-h);
      background: var(--tab-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 6px;
      flex-shrink: 0;
    }

    .tab-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.live {
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    .status-dot.busy {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .panel-body {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── PRESET BUTTONS ── */
    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .preset-btn {
      background: var(--tab-active);
      border: 1.5px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 10px 6px;
      cursor: pointer;
      font-family: 'Lexend', sans-serif;
      font-size: 11px;
      font-weight: 600;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .preset-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .preset-btn.running {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .preset-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

    .preset-count {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .preset-btn.running .preset-count { color: var(--accent); }

    /* ── CUSTOM INPUTS ── */
    .custom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input[type="number"] {
      background: var(--tab-active);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* ── PROGRESS ── */
    .progress-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    /* ── RIGHT PANEL: LOG ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .log-bar {
      height: var(--tab-bar-h);
      background: var(--tab-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
    }

    .log-bar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: 1;
    }

    .log-count {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Lexend', sans-serif;
      font-size: 11px;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }

    .clear-btn:hover { color: var(--text); background: var(--border); }

    .log-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .log-output::-webkit-scrollbar { width: 4px; }
    .log-output::-webkit-scrollbar-track { background: transparent; }
    .log-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-line { display: flex; gap: 10px; padding: 1px 0; border-bottom: 1px solid #111; }
    .log-line:last-child { border-bottom: none; }
    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-msg { color: var(--text); word-break: break-all; flex: 1; }
    .log-line.success .log-msg { color: #22c55e; }
    .log-line.error   .log-msg { color: #f87171; }
    .log-line.info    .log-msg { color: var(--accent); }
    .log-empty { color: var(--muted); font-size: 11px; padding: 4px 0; }

    /* ── FOOTER ── */
    footer {
      height: 26px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    footer .left { display: flex; gap: 16px; align-items: center; }
    footer .sep { color: var(--border); }

    .kbd {
      background: var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <h1>⚡ History Flooder v0.3</h1>
    <div class="header-actions">
      <button class="btn" onclick="clearLog()">Clear Log</button>
      <button class="btn btn-accent" id="customRunBtn" onclick="runCustom()">▶ Execute</button>
    </div>
  </header>

  <div class="workspace">

    <!-- LEFT: CONTROLS -->
    <div class="left-panel">
      <div class="tab-bar">
        <span class="tab-label">Controls</span>
        <div class="status-dot" id="statusDot"></div>
      </div>

      <div class="panel-body">

        <!-- Status -->
        <div>
          <div class="section-label">Status</div>
          <div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted);" id="statusText">SYSTEM READY — AWAITING INPUT</div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Quick Launch -->
        <div>
          <div class="section-label">Quick Launch</div>
          <div class="presets">
            <button class="preset-btn" id="lightBtn" onclick="runPreset(10, 900, 'LIGHT')">
              <span>▸ Light</span>
              <span class="preset-count">10 tabs</span>
            </button>
            <button class="preset-btn" id="mediumBtn" onclick="runPreset(100, 700, 'MEDIUM')">
              <span>▸▸ Medium</span>
              <span class="preset-count">100 tabs</span>
            </button>
            <button class="preset-btn" id="heavyBtn" onclick="runPreset(10000, 50, 'NUKE')">
              <span>▸▸▸ Nuke</span>
              <span class="preset-count">10k tabs</span>
            </button>
          </div>
        </div>

        <!-- Custom -->
        <div>
          <div class="section-label">Custom Config</div>
          <div class="custom-grid">
            <div class="input-group">
              <span class="input-label">Tab Count</span>
              <input id="customCount" type="number" min="1" max="10000" value="2" />
            </div>
            <div class="input-group">
              <span class="input-label">Delay (ms)</span>
              <input id="customDelay" type="number" min="100" max="5000" value="800" />
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- RIGHT: LOG -->
    <div class="right-panel">
      <div class="log-bar">
        <span class="log-bar-label">Output Log</span>
        <span class="log-count" id="logCount"></span>
        <button class="clear-btn" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-output" id="logOutput">
        <span class="log-empty">Log output will appear here…</span>
      </div>
    </div>

  </div>

  <footer>
    <div class="left">
      <span>History Flooder</span>
      <span class="sep">|</span>
      <span>v0.3</span>
      <span class="sep">|</span>
      <span>FOR LOCAL USE ONLY</span>
    </div>
    <span>made by UNBL0CKEDZ0NE</span>
  </footer>

  <script>
    const sitePool = [
      "https://www.google.com","https://www.google.com/classroom","https://classroom.google.com",
      "https://drive.google.com","https://docs.google.com/document","https://docs.google.com/spreadsheets",
      "https://docs.google.com/presentation","https://docs.google.com/forms","https://kahoot.it",
      "https://www.blooket.com","https://quizlet.com","https://www.khanacademy.org",
      "https://www.duolingo.com","https://edpuzzle.com","https://www.grammarly.com",
      "https://www.newsela.com","https://www.turnitin.com","https://nearpod.com",
      "https://www.nationalgeographic.com","https://www.britannica.com","https://www.typing.com",
      "https://www.socrative.com","https://www.desmos.com/calculator","https://scholar.google.com",
      "https://www.ck12.org","https://www.readworks.org","https://www.brainpop.com",
      "https://www.dictionary.com","https://www.wikipedia.org","https://www.bbc.co.uk/bitesize",
      "https://www.coolmathgames.com","https://www.discoveryeducation.com","https://www.edx.org",
      "https://www.coursera.org","https://www.ixl.com","https://www.prodigygame.com",
      "https://www.brainly.com","https://www.mathplayground.com","https://www.typingclub.com",
      "https://www.funbrain.com","https://www.mathsisfun.com","https://www.getepic.com",
      "https://www.freckle.com","https://www.pbslearningmedia.org","https://www.abcya.com",
      "https://www.splashlearn.com","https://www.turtlediary.com","https://www.softschools.com",
      "https://www.mysteryscience.com","https://www.ducksters.com","https://www.natgeokids.com"
    ];

    function randSite() { return sitePool[Math.floor(Math.random() * sitePool.length)]; }

    const logOutput = document.getElementById('logOutput');
    let logCount = 0;

    function now() { return new Date().toTimeString().slice(0,8); }

    function addLog(msg, type = '') {
      const empty = logOutput.querySelector('.log-empty');
      if (empty) empty.remove();
      logCount++;
      document.getElementById('logCount').textContent = logCount + ' entr' + (logCount !== 1 ? 'ies' : 'y');
      const line = document.createElement('div');
      line.className = 'log-line ' + type;
      line.innerHTML = `<span class="log-time">[${now()}]</span><span class="log-msg">${msg}</span>`;
      logOutput.appendChild(line);
      logOutput.scrollTop = logOutput.scrollHeight;
    }

    function clearLog() {
      logCount = 0;
      logOutput.innerHTML = '<span class="log-empty">Log output will appear here…</span>';
      document.getElementById('logCount').textContent = '';
    }

    function setStatus(msg, state = 'idle') {
      document.getElementById('statusText').textContent = msg;
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot';
      if (state === 'busy') dot.classList.add('busy');
      if (state === 'done') dot.classList.add('live');
    }

    let running = false;
    const presetBtns = ['lightBtn','mediumBtn','heavyBtn'].map(id => document.getElementById(id));
    const execBtn = document.getElementById('customRunBtn');

    function setAllDisabled(val) {
      presetBtns.forEach(b => b.disabled = val);
      execBtn.disabled = val;
    }

    async function openSequential(count, delayMs, label) {
      if (running) return;
      running = true;
      setAllDisabled(true);
      setStatus(`RUNNING — ${label} (${count} TABS)`, 'busy');
      addLog(`Launching ${count} tab(s) · ${delayMs}ms delay · mode: ${label}`, 'info');
      const bar = document.getElementById('progressBar');
      bar.style.width = '0%';

      for (let i = 0; i < count; i++) {
        const url = randSite();
        const domain = url.replace('https://','').split('/')[0];
        try {
          window.open(url, '_blank');
          addLog(`Opened: ${domain}`, 'success');
        } catch(e) {
          addLog(`Blocked: ${domain}`, 'error');
        }
        bar.style.width = `${((i + 1) / count) * 100}%`;
        await new Promise(r => setTimeout(r, delayMs));
      }

      addLog(`Complete — ${count} tab(s) processed`, 'info');
      setStatus(`DONE — ${count} TAB(S) LAUNCHED`, 'done');
      setTimeout(() => { bar.style.width = '0%'; }, 1500);
      running = false;
      setAllDisabled(false);
    }

    function runPreset(count, delay, label) { openSequential(count, delay, label); }

    function runCustom() {
      let count = parseInt(document.getElementById('customCount').value) || 1;
      let delay = parseInt(document.getElementById('customDelay').value) || 800;
      count = Math.min(Math.max(count, 1), 10000);
      delay = Math.min(Math.max(delay, 100), 5000);
      openSequential(count, delay, `CUSTOM`);
    }
  </script>

</body>
</html>
