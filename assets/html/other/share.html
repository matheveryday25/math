<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Screen Sharer — UNBL0CKEDZ0NE</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #060606;
    --panel: #0e0e0e;
    --border: #1e1e1e;
    --accent: #ff9900;
    --accent-dim: rgba(255,153,0,0.12);
    --accent-glow: rgba(255,153,0,0.4);
    --text: #e8e8e8;
    --muted: #555;
    --tab-bg: #111;
    --tab-active: #1a1a1a;
    --header-h: 52px;
    --tab-bar-h: 44px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-shadow: 0 0 18px var(--accent-glow);
  }

  /* ── TAB BAR ── */
  .tab-bar {
    height: var(--tab-bar-h);
    background: var(--tab-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    padding: 0 8px;
    gap: 4px;
    flex-shrink: 0;
  }

  .tab {
    display: flex;
    align-items: center;
    padding: 0 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    user-select: none;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── CONTENT ── */
  .content {
    display: none;
    flex: 1;
    padding: 28px 20px;
    overflow-y: auto;
  }

  .content.active { display: block; }

  .col {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .col h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-shadow: 0 0 12px var(--accent-glow);
  }

  .hint {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  /* ── VIDEO ── */
  video {
    width: 100%;
    border-radius: 8px;
    background: #000;
    max-height: 46vh;
    object-fit: contain;
    display: block;
    border: 1px solid var(--border);
  }

  /* ── TEXTAREA ── */
  textarea {
    width: 100%;
    min-height: 80px;
    border-radius: 8px;
    padding: 12px 14px;
    background: #0a0a0a;
    color: var(--text);
    border: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  textarea::placeholder { color: #2a2a2a; }

  /* ── BUTTONS ── */
  .row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 7px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, background 0.2s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-primary {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .btn-primary:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-primary:active { transform: scale(0.98); }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ── FOOTER ── */
  footer {
    height: 26px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    flex-shrink: 0;
  }

  footer span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .sep { color: var(--border) !important; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>
<body>

  <header>
    <h1>⚡ Screen Sharer</h1>
  </header>

  <div class="tab-bar">
    <div class="tab active" data-tab="sharer">Host (Sharer)</div>
    <div class="tab" data-tab="viewer">Viewer</div>
  </div>

  <div class="content active" id="sharer">
    <div class="col">
      <h2>Host (Sharer)</h2>
      <p class="hint">Click "Share Screen" → copy Offer Code → give it to the Viewer. Then paste the Viewer's Answer below.</p>

      <video id="localPreview" autoplay playsinline muted></video>

      <div class="row">
        <button class="btn btn-primary" id="startShareBtn">▶ Share Screen</button>
        <button class="btn" id="stopShareBtn">Stop</button>
        <button class="btn" id="fsLocal">Fullscreen</button>
      </div>

      <hr class="divider">

      <textarea id="localOffer" readonly placeholder="Offer code will appear here…"></textarea>
      <div class="row">
        <button class="btn btn-primary" id="copyOfferBtn">Copy Offer</button>
      </div>

      <textarea id="remoteAnswer" placeholder="Paste viewer answer code here…"></textarea>
      <div class="row">
        <button class="btn btn-primary" id="applyAnswerBtn">Apply Answer</button>
      </div>
    </div>
  </div>

  <div class="content" id="viewer">
    <div class="col">
      <h2>Viewer</h2>
      <p class="hint">Paste the Host's Offer → click "Connect" → copy the Answer back to the Host.</p>

      <video id="remoteView" autoplay playsinline></video>

      <div class="row">
        <button class="btn" id="fsRemote">Fullscreen</button>
      </div>

      <hr class="divider">

      <textarea id="offerInput" placeholder="Paste host offer code here…"></textarea>
      <div class="row">
        <button class="btn btn-primary" id="connectBtn">Connect</button>
      </div>

      <textarea id="answerOutput" readonly placeholder="Your answer code will appear here…"></textarea>
      <div class="row">
        <button class="btn btn-primary" id="copyAnswerBtn">Copy Answer</button>
      </div>
    </div>
  </div>

  <footer>
    <span>Screen Sharer</span>
    <span class="sep">|</span>
    <span>made by UNBL0CKEDZ0NE</span>
  </footer>

<script>
  const $ = id => document.getElementById(id);
  let pc, localStream;

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      $(tab.dataset.tab).classList.add('active');
    };
  });

  // Host (Sharer)
  $('startShareBtn').onclick = async () => {
    pc = new RTCPeerConnection();
    pc.onicecandidate = e => {
      if (e.candidate) return;
      $('localOffer').value = btoa(JSON.stringify(pc.localDescription));
    };
    localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    $('localPreview').srcObject = localStream;
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
  };

  $('applyAnswerBtn').onclick = async () => {
    const answer = $('remoteAnswer').value;
    if (!answer) return alert('Paste answer first');
    const desc = JSON.parse(atob(answer));
    await pc.setRemoteDescription(desc);
  };

  $('copyOfferBtn').onclick = () => navigator.clipboard.writeText($('localOffer').value);
  $('stopShareBtn').onclick = () => { localStream?.getTracks().forEach(t => t.stop()); };

  // Viewer
  $('connectBtn').onclick = async () => {
    pc = new RTCPeerConnection();
    pc.onicecandidate = e => {
      if (e.candidate) return;
      $('answerOutput').value = btoa(JSON.stringify(pc.localDescription));
    };
    pc.ontrack = e => $('remoteView').srcObject = e.streams[0];
    const offer = $('offerInput').value;
    if (!offer) return alert('Paste host code first');
    const desc = JSON.parse(atob(offer));
    await pc.setRemoteDescription(desc);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
  };

  $('copyAnswerBtn').onclick = () => navigator.clipboard.writeText($('answerOutput').value);

  // Fullscreen
  $('fsLocal').onclick  = () => $('localPreview').requestFullscreen();
  $('fsRemote').onclick = () => $('remoteView').requestFullscreen();
</script>
</body>
</html>
