<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/daddy/index.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

</body>
</html>
<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/daddy/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Whos Your Daddy</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background: #231f20;
        }

        #unity-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #231F20;
            z-index: 1;
        }

        #loading-text {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 1000;
            font-size: 48px;
            font-family: cursive;
            text-align: center;
            font-weight: bold;
            background: linear-gradient(
                270deg,
                #ff0000,
                #ff7f00,
                #ffff00,
                #00ff00,
                #0000ff,
                #4b0082,
                #8f00ff
            );
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbow 3s ease infinite;
            text-shadow: none;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #unity-loading-bar {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #unity-logo {
            width: 154px;
            height: 130px;
            background: url('https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/daddy/TemplateData/unity-logo-dark.png') no-repeat center;
            background-size: contain;
        }

        #unity-progress-bar-empty {
            width: 141px;
            height: 18px;
            background: url('https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/daddy/TemplateData/progress-bar-empty-dark.png') no-repeat center;
            background-size: contain;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 18px;
            background: url('https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/daddy/TemplateData/progress-bar-full-dark.png') no-repeat center;
            background-size: 141px 18px;
            transition: width 0.1s linear;
        }

        #unity-warning {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #ff9900;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 1001;
            display: none;
        }
    </style>
<base target="_blank">
</head>
<body style="text-align: center; padding: 0; border: 0; margin: 0;">

    <div id="loading-text">LOADING... 0.00 MB / 120.36 MB</div>

    <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>

    <div id="unity-warning"></div>

    <canvas id="unity-canvas" tabindex="-1" style="background: #231F20"></canvas>

    <script src="Build/daddyreeyuki.loader.js"></script>
    <script>
        const loadingText = document.querySelector("#loading-text");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        let loadedBytes = 0;
        const mbTotal = '120.36';

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);

                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
                progressBarFull.style.width = Math.min((loadedBytes / (120.36 * 1024 * 1024)) * 100, 100) + "%";
            }

            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(fileParts) {
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            const mergedBlob = new Blob(buffers);
            return URL.createObjectURL(mergedBlob);
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        (async () => {
            const [dataUrl, wasmUrl] = await Promise.all([
                mergeFiles(getParts("Build/daddyreeyuki.data", 1, 5)),
                mergeFiles(getParts("Build/daddyreeyuki.wasm", 1, 3))
            ]);

            const canvas = document.querySelector("#unity-canvas");
            const loadingBar = document.querySelector("#unity-loading-bar");

            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                var meta = document.createElement('meta');
                meta.name = 'viewport';
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                document.getElementsByTagName('head')[0].appendChild(meta);

                canvas.style.width = "100%";
                canvas.style.height = "100%";
                canvas.style.position = "fixed";
                document.body.style.textAlign = "left";
            }

            createUnityInstance(canvas, {
                dataUrl: dataUrl,
                frameworkUrl: "Build/daddyreeyuki.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Joe Williams",
                productName: "WhosYourDaddy",
                productVersion: "1.0",
            }, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none";
                loadingText.remove();
            }).catch((message) => {
                alert(message);
            });
        })();
    </script>
</body>
</html>
