<html><head><base target="_blank"></head><body><div id="container">
  <iframe id="fr" width="100%" height="100%" frameborder="0" allowfullscreen="" style="display:none;"></iframe>
  
  <div id="button-wrapper">
    <button class="play-button school" type="button" onclick="PlayTo(this)">PLAY FOR SCHOOL</button>
  </div>
</div>

<style>
  body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; }
  #container { position: relative; width: 100%; height: 100%; }

  #button-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 1001;
  }

  .play-button { 
    padding: 20px 40px; 
    background: #000; 
    color: #fff; 
    border: 2px solid #4a148c; 
    border-radius: 10px; 
    font: bold 22px Arial; 
    cursor: pointer; 
    transition: 0.3s;
    white-space: nowrap;
  }

  .play-button:hover { background: #4a148c; transform: scale(1.05); }
</style>

<script>
  const FILE_URL = 'https://cdn.jsdelivr.net/gh/awaiblecomponent/ss65@main/soc.xml';
  const DB_NAME = 'GameCacheDB';
  const STORE_NAME = 'GameFiles';
  const CACHE_DURATION = 90 * 24 * 60 * 60 * 1000;

  function openDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME, { keyPath: 'url' });
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    });
  }

  async function getFileFromCache(url) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const transaction = db.transaction(STORE_NAME, 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      const request = store.get(url);
      request.onsuccess = async (e) => {
        const data = e.target.result;
        if (data && (Date.now() - data.timestamp) < CACHE_DURATION) {
          resolve(data.content);
        } else {
          try {
            const response = await fetch(url);
            const text = await response.text();
            const clean = text.replace(/<!\[CDATA\[|\]\]>/g, '');
            const writeTx = db.transaction(STORE_NAME, 'readwrite');
            writeTx.objectStore(STORE_NAME).put({ url, content: clean, timestamp: Date.now() });
            resolve(clean);
          } catch (err) { reject(err); }
        }
      };
      request.onerror = () => reject(new Error('DB error'));
    });
  }

  function PlayTo() {
    const iframe = document.getElementById("fr");
    getFileFromCache(FILE_URL).then((text) => {
      iframe.contentDocument.open();
      iframe.contentDocument.write(text);
      iframe.contentDocument.close();
      iframe.style.display = "block";
      document.getElementById("button-wrapper").style.display = "none";
    }).catch(err => alert('Oyun yüklenemedi.'));
  }

  window.addEventListener('load', PlayTo);
</script></body></html>
