  <script>
    // Custom loader'ı gizle
    function hideCustomLoader() {
      var loader = document.getElementById('customLoader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(function() {
          loader.style.display = 'none';
        }, 500);
      }
    }

    // Status text güncelle
    function updateLoaderStatus(text) {
      var status = document.getElementById('loaderStatus');
      if (status) {
        status.textContent = text;
      }
    }

    var gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/ftbaldana/77uu77@main/Build/lel.json", {
      onProgress: function(gameInstance, progress) {
        if (progress > 0 && progress < 1) {
          updateLoaderStatus('Loading... ' + Math.round(progress * 100) + '%');
        } else if (progress >= 1) {
          updateLoaderStatus('Starting game...');
        }
        
        if (typeof UnityProgress === 'function') {
          UnityProgress(gameInstance, progress);
        }
      },
      Module: {
        onRuntimeInitialized: function() {
          updateLoaderStatus('Game ready!');
          
          setTimeout(hideCustomLoader, 300);
          
          if (typeof UnityProgress === 'function') {
            UnityProgress(gameInstance, "complete");
          }
          
          var ohayoUnityLogo = document.querySelector("#ohayo-unity-logo");
          var ohayoLogo = document.querySelector("#ohayo-logo");
          
          if (ohayoUnityLogo && ohayoLogo) {
            const anim = ohayoUnityLogo.animate([
              { opacity: 0 },
              { opacity: 1, offset: 0.5 },
              { opacity: 0, offset: 1 }
            ], 1500);
            
            anim.onfinish = (event) => {
              ohayoUnityLogo.style.display = "none";
              ohayoLogo.style.visibility = "visible";
            };
          }
        }
      }
    });

    document.addEventListener('touchend', (e) => {
      openFullscreen();
      if (!window.gameplayStarted) return;
      
      var evt = (typeof e.originalEvent === 'undefined') ? e : e.originalEvent;
      for (var i = 0; i < e.changedTouches.length; ++i) {
        var touch = evt.touches[i] || evt.changedTouches[i];
        if (typeof JOYSTICK_DIV !== 'undefined' && JOYSTICK_DIV && 
            JOYSTICK_DIV.style.visibility == "visible" &&
            touch.clientX > 9 * innerWidth / 10 && touch.clientY < innerHeight / 6) {
          window.dispatchEvent(new KeyboardEvent('keydown', { 'keyCode': 27 }));
          window.dispatchEvent(new KeyboardEvent('keyup', { 'keyCode': 27 }));
          SetJoyStickVisible(false);
          break;
        } else if (touch.clientX > 2 * innerWidth / 5 && touch.clientX < 3 * innerWidth / 5 &&
          touch.clientY > 3 * innerHeight / 9 && touch.clientY < 4 * innerHeight / 9) {
          SetJoyStickVisible(true);
          break;
        }
      }
    });

    document.oncontextmenu = function(e) {
      e.preventDefault();
    }
  </script>

  <script type="text/javascript">
    var ohayoLogo = document.querySelector("#ohayo-logo");
    var ohayoUnityLogo = document.querySelector("#ohayo-unity-logo");

    function onBlur() {
      window.MasterMute = true;
      if (window.gameplayStarted) {
        setTimeout(function() {
          window.dispatchEvent(new KeyboardEvent('keydown', { 'keyCode': 27 }));
          window.dispatchEvent(new KeyboardEvent('keyup', { 'keyCode': 27 }));
          if (mobileAndTabletCheck())
            SetJoyStickVisible(false);
        }, 0);
      }
    }

    function onFocus() {
      window.MasterMute = false;
    }

    if (mobileAndTabletCheck()) {
      window.addEventListener("load", function() {
        function run_all_time() {
          requestAnimationFrame(run_all_time);
          if (typeof JOYSTICK_DIV === 'undefined' || !JOYSTICK_DIV || JOYSTICK_DIV.style.visibility == "hidden")
            return;
          window.dispatchEvent(new KeyboardEvent('keyup', { 'keyCode': 87 }));
          window.dispatchEvent(new KeyboardEvent('keyup', { 'keyCode': 83 }));
          window.dispatchEvent(new KeyboardEvent('keyup', { 'keyCode': 68 }));
          window.dispatchEvent(new KeyboardEvent('keyup', { 'keyCode': 65 }));
          if (typeof joystick !== 'undefined' && joystick) {
            if (joystick.up)
              window.dispatchEvent(new KeyboardEvent('keydown', { 'keyCode': 87 }));
            else if (joystick.down)
              window.dispatchEvent(new KeyboardEvent('keydown', { 'keyCode': 83 }));
            if (joystick.left)
              window.dispatchEvent(new KeyboardEvent('keydown', { 'keyCode': 65 }));
            else if (joystick.right)
              window.dispatchEvent(new KeyboardEvent('keydown', { 'keyCode': 68 }));
          }
        }
        run_all_time();
      });
    }
  </script>

<script>
  (function () {
    const showDelay = 2000; 
    const countdownStart = 12; 
    const reappearDelay = 150000; // 2.5 MINUTES (150 seconds)
    const adContainer = document.getElementById('ad-container');
    const closeBtn = document.getElementById('close-ad');

    function setRandomCorner() {
      const corners = [
        { top: '2px', left: '2px', right: 'auto', bottom: 'auto', transform: 'scale(0.5)' },    // Top-Left
        { top: '2px', left: 'auto', right: '2px', bottom: 'auto', transform: 'scale(0.5)' },   // Top-Right
        { top: 'auto', left: '2px', right: 'auto', bottom: '2px', transform: 'scale(0.5)' },   // Bottom-Left
        { top: 'auto', left: 'auto', right: '2px', bottom: '2px', transform: 'scale(0.5)' }    // Bottom-Right
      ];
      
      const randomChoice = corners[Math.floor(Math.random() * corners.length)];
      Object.assign(closeBtn.style, randomChoice);
    }

    function resetToCenter() {
      closeBtn.style.top = '0';
      closeBtn.style.left = '50%';
      closeBtn.style.right = 'auto';
      closeBtn.style.bottom = 'auto';
      closeBtn.style.transform = 'translateX(-50%) scale(0.9)';
    }

    function showAd() {
      resetToCenter();
      adContainer.style.display = 'block';
      adContainer.classList.remove('hidden');
      
      let timeLeft = countdownStart;
      closeBtn.disabled = true;
      closeBtn.classList.remove('enabled');
      closeBtn.textContent = `Wait (${timeLeft})`;

      const t = setInterval(() => {
        timeLeft--;
        if (timeLeft > 0) {
          closeBtn.textContent = `Wait (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.textContent = ''; 
          setRandomCorner(); 
          closeBtn.classList.add('enabled'); 
        }
      }, 1000);
    }

    setTimeout(showAd, showDelay);

    closeBtn.addEventListener('click', () => {
      if (closeBtn.disabled) return;
      adContainer.classList.add('hidden');
      // Set to reappear after 150 seconds
      setTimeout(showAd, reappearDelay);
    });
  })();
</script>
