<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/baldi/index.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

        function formatSize(bytes) {
            if (bytes > 1024 * 1024 * 1024) {
                return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
            } else if (bytes > 1024 * 1024) {
                return (bytes / (1024 * 1024)).toFixed(2) + " MB";
            } else if (bytes > 1024) {
                return (bytes / 1024).toFixed(2) + " KB";
            } else {
                return bytes + " B";

        }

        async function getSize(url) {
            try {
                const res = await fetch(url, { method: "HEAD" });
                return parseInt(res.headers.get("Content-Length") || "0", 10);
            } catch {
                return 0;
            }
        }

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);
                const doneText = formatSize(loadedBytes);
                const totalText = formatSize(totalBytes);
                const percent = totalBytes > 0 ? ((loadedBytes / totalBytes) * 100).toFixed(1) : "?";
                loadingText.textContent = `LOADING... ${doneText} / ${totalText} (${percent}%)`;
            }
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(parts) {
            const buffers = await Promise.all(parts.map(fetchWithProgress));
            return URL.createObjectURL(new Blob(buffers));
        }

        function getParts(file, count) {
