<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/inc/index.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

</body>
</html>
<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <base href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/inc/" />
    <title>Plague Inc - UNBL0CKEDZ0NE</title>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: black;
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #0b0b0b;
        color: white;
        font-family: sans-serif;
      }

      #bar {
        width: 60%;
        height: 12px;
        background: #333;
      }

      #fill {
        height: 100%;
        width: 0%;
        background: #4caf50;
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <div id="text">0 MB / 300 MB</div>
      <div id="bar">
        <div id="fill"></div>
      </div>
    </div>

    <canvas id="unity-canvas"></canvas>

    <script src="Build/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js"></script>

    <script>
      const baseBuild = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/inc/Build/";
      const base = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/inc/";

      const MAX_RETRIES = 3;
      const RETRY_DELAY_MS = 1000;

      // Per-part progress tracking
      const partProgress = new Map();
      const totalGuess = 317 * 1024 * 1024;

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function updateUI() {
        let loaded = 0;
        for (const v of partProgress.values()) loaded += v;
        const mb = (loaded / 1024 / 1024).toFixed(1);
        const total = (totalGuess / 1024 / 1024).toFixed(0);
        document.getElementById("text").textContent = mb + " MB / " + total + " MB";
        document.getElementById("fill").style.width = (loaded / totalGuess) * 100 + "%";
      }

      async function fetchPartWithRetry(url, retries = MAX_RETRIES) {
        for (let attempt = 0; attempt <= retries; attempt++) {
          try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);

            // Reset this part's progress on retry
            if (attempt > 0) {
              partProgress.set(url, 0);
              updateUI();
            }

            const reader = res.body.getReader();
            const chunks = [];
            let received = 0;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              received += value.byteLength;
              partProgress.set(url, received);
              updateUI();
            }

            const out = new Uint8Array(received);
            let off = 0;
            for (const c of chunks) {
              out.set(c, off);
              off += c.byteLength;
            }
            return out.buffer;
          } catch (err) {
            if (attempt < retries) {
              console.warn(`Retry ${attempt + 1}/${retries} for ${url}:`, err.message);
              await sleep(RETRY_DELAY_MS * (attempt + 1));
            } else {
              throw new Error("Failed after " + (retries + 1) + " attempts: " + url);
            }
          }
        }
      }

      const files = [
        { name: "6b69ec426bff8a6bd4e760a1d5f507b9.wasm", parts: 2 },
        { name: "3719aa6c33bf126ed64864ee5fc2fafc.data", parts: 15 }
      ];

      function buildUrls(file) {
        const urls = [];
        for (let i = 0; i < file.parts; i++) {
          urls.push(baseBuild + file.name + ".part" + String(i).padStart(2, "0"));
        }
        return urls;
      }

      async function loadFile(file) {
        const urls = buildUrls(file);

        // All parts fetched in parallel with per-part retry and streaming progress
        const buffers = await Promise.all(urls.map((url) => fetchPartWithRetry(url)));

        let size = 0;
        for (const b of buffers) size += b.byteLength;

        const out = new Uint8Array(size);
        let off = 0;
        for (const b of buffers) {
          out.set(new Uint8Array(b), off);
          off += b.byteLength;
        }

        return out.buffer;
      }

      async function start() {
        // wasm and data files loaded fully in parallel
        const [wasm, data] = await Promise.all([loadFile(files[0]), loadFile(files[1])]);

        const wasmUrl = URL.createObjectURL(new Blob([wasm], { type: "application/wasm" }));
        const dataUrl = URL.createObjectURL(new Blob([data]));

        document.getElementById("loader").style.display = "none";

        createUnityInstance(document.querySelector("#unity-canvas"), {
          dataUrl: dataUrl,
          frameworkUrl: baseBuild + "b4b58f3ff6d98fbfb83482e25e0e9a5c.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: base + "StreamingAssets",
          companyName: "Ndemic Creations",
          productName: "Plague Inc",
          productVersion: "1.18.3.2"
        });
      }

      start().catch(function (err) {
        document.getElementById("text").textContent = "Error: " + err.message;
        console.error(err);
      });
    </script>
  </body>
</html>
