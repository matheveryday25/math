<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/fullscreen/repo.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

</body>
</html>

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';

                    warningBanner.removeChild(div);

            }

        }

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }
        Promise.all([
            mergeFiles(getParts("Build/NewestBuild.wasm.gz", 1, 3)),

                document.getElementsByTagName('head')[0].appendChild(meta);
                container.className = "unity-mobile";
