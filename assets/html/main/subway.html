<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/subway2/index.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

</body>
</html>

        async function mergeSplitFile(fileUrlBase, numParts = 2) {
            const partUrls = Array.from({ length: numParts }, (_, i) =>
                `${fileUrlBase}.part${i + 1}`
            );
            try {
                const responses = await Promise.all(partUrls.map(url => fetch(url)));
                if (responses.some(r => !r.ok)) { return null; }
                const parts = await Promise.all(responses.map(r => r.arrayBuffer()));
                const combinedBlob = new Blob(parts, { type: 'application/octet-stream' });
                return URL.createObjectURL(combinedBlob);
            } catch (error) { return null; }
        }

        function setupXHRInterceptor() {
            if (window.xhrInterceptorInstalled) { return; }
            const originalOpen = XMLHttpRequest.prototype.open;
            const originalSend = XMLHttpRequest.prototype.send;
            XMLHttpRequest.prototype.open = function(method, url, ...args) {
                this._url = url; this._method = method; this._args = args;
                let finalUrl = url;
                for (const [filename, blobUrl] of Object.entries(window.mergedBlobUrls)) {
                    if (url.includes(filename)) { finalUrl = blobUrl; break; }
                }
                return originalOpen.call(this, method, finalUrl, ...args);
            };
            XMLHttpRequest.prototype.send = function(...args) {
                const xhr = this;
                if (!window.assetsReady) {
                    const checkReady = setInterval(() => {
                        if (window.assetsReady) { clearInterval(checkReady); originalSend.apply(xhr, args); }
                    }, 50);
                    return;
                }
                return originalSend.apply(this, args);
            };
            window.xhrInterceptorInstalled = true;
        }

        async function prepareGameAssets() {
            try {
                window.assetsReady = false;
                delete window.xhrInterceptorInstalled;
                window.mergedBlobUrls = {};
                setupXHRInterceptor();
                const filesToMerge = ['SanFrancisco.data.unityweb', 'SanFrancisco.wasm.code.unityweb'];
                for (const filename of filesToMerge) {
                    const blobUrl = await mergeSplitFile(filename, 2);
                    if (blobUrl) { window.mergedBlobUrls[filename] = blobUrl; }
                }
                window.assetsPrepared = true;
                window.assetsReady = true;
            } catch (error) {
                window.assetsPrepared = false;
                window.assetsReady = true;
            }
        }

        prepareGameAssets();
