  <style>
    html, body {
      overflow: hidden;
    }
    #copyright-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 99999;
      background: linear-gradient(90deg, #111, #1a1a1a);
      border-bottom: 2px solid #ff9900;
      box-shadow: 0 0 16px #ff9900;
      color: #fff;
      font-family: 'Pixelify Sans', sans-serif;
      font-size: 13px;
      text-align: center;
      padding: 12px 20px;
      letter-spacing: 1px;
      animation: fadeOut 0.6s ease 4.4s forwards;
    }
    #copyright-banner span {
      color: #ff9900;
      text-shadow: 0 0 8px #ff9900;
    }
    #copyright-timer { display: none; }
    @keyframes fadeOut {
      to { opacity: 0; pointer-events: none; transform: translateY(-100%); }
    }
  </style>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/style.css">
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/UnityProgress.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/2.7.js"></script>
  <script type="text/javascript">
    var gameInstance;
    window.onload = function () {
      gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/2.7.json", {
        onProgress: UnityProgress,
        Module: {
          onRuntimeInitialized: function () {
            UnityProgress(gameInstance, "complete");
          },
        },
      });
    };
  </script>
  <div class="webgl-content">
    <div id="gameContainer" style="width: 100%; height: 100%; margin: 0px; padding: 0px; border: 0px; position: relative; background: rgb(0, 0, 0);">
      <canvas id="#canvas" style="width: 100%; height: 100%; cursor: default;" width="1350" height="951"></canvas>
      <div class="logo Dark" style="display: none;"></div>
      <div class="progress Dark" style="display: none;">
        <div class="empty" style="width: 0%;"></div>
        <div class="full" style="width: 100%;"></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/1firebase-app.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/1firebase-auth.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/1firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/1firebase.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/1login.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/1v1lol/1firestore.js"></script>
  <script>
    initializeFireBase();
    function showAds() {
      console.log("show ads");
    }
    function requestNewAd() {
      unityAdFinishedCallback();
    }
    function unityAdFinishedCallback() {
      try {
        if (gameInstance) gameInstance.SendMessage("AdsManager", "OnWebCallback");
      } catch (error) {
        console.log(error);
      }
    }
  </script>
</head>
<body>

  <!-- Copyright Banner -->
  <div id="copyright-banner">
    ⚠️ I own <span>this game repo</span> — If you take from here <span>please ask me!</span> &nbsp;—&nbsp; <span>UNBL0CKEDZ0NE ⚠️</span>
    <span id="copyright-timer">5</span>
  </div>

  <script>
    var count = 5;
    var timerEl = document.getElementById("copyright-timer");
    var bannerEl = document.getElementById("copyright-banner");
    var interval = setInterval(function() {
      count--;
      if (timerEl) timerEl.innerText = count;
      if (count <= 0) {
        clearInterval(interval);
        setTimeout(function() {
          if (bannerEl) bannerEl.remove();
        }, 600);
      }
    }, 1000);
  </script>

</body>
