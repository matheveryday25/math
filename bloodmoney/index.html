<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fullscreen Button</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    #fullscreenButton {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background-color: #111;
      color: #fff;
      border: 2px solid #ff9900;
      font-size: 12px;
      font-family: 'Audiowide', sans-serif;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 8px;
      letter-spacing: 1px;
      box-shadow: 0 0 10px #ff9900;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .fireInside {
      background-image: linear-gradient(270deg, red, orange, yellow);
      background-size: 300% 300%;
      animation: fireInside 3s linear infinite;
      color: #fff;
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
      box-shadow: inset 0 0 10px rgba(255,165,0,0.4), 0 0 14px #ff9900;
    }
    @keyframes fireInside {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>

  <button
    id="fullscreenButton"
    onclick="openPage()"
    onmouseover="this.classList.add('fireInside')"
    onmouseout="this.classList.remove('fireInside')">
    ⛶ Fullscreen
  </button>

  <script>
    // 🟠 SET YOUR CDN URL HERE
    var url = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/bloodmoney/index.html";

    var ORIGINAL_TEXT = "⛶ Fullscreen";
    var ERROR_TEXT    = "Not Found!";
    var POPUP_TEXT    = "Allow Popups!";

    function setTemp(text, ms) {
      var btn = document.getElementById("fullscreenButton");
      btn.innerText = text;
      btn.classList.add("fireInside");
      setTimeout(function() {
        btn.innerText = ORIGINAL_TEXT;
        btn.classList.remove("fireInside");
      }, ms || 3500);
    }

    function openPage() {
      fetch(url + "?t=" + Date.now())
        .then(function(r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function(html) {
          var win = window.open("about:blank", "_blank");
          if (!win) { setTemp(POPUP_TEXT, 4500); return; }
          win.document.open();
          win.document.write(html);
          win.document.close();
          document.getElementById("fullscreenButton").innerText = "Opened!";
          setTimeout(function() {
            document.getElementById("fullscreenButton").innerText = ORIGINAL_TEXT;
          }, 3000);
        })
        .catch(function() {
          setTemp(ERROR_TEXT);
        });
    }
  </script>

</body>
</html>

    <script>
        
        // full screen the game ----------------------------------------------------------
        function applycanvasmode() {
            let w = 0;
            let h = 0;
            let maxW = window.innerWidth;
            let maxH = window.innerHeight;
            if ((maxW * 0.75) > maxH) {
                h = maxH;
                w = Math.floor((maxH / 3) * 4);
            } else {
                w = maxW;
                h = Math.floor((maxW / 4) * 3);
            }
            document.querySelector("#GameCanvas").style.width = w + "px";
            document.querySelector("#GameCanvas").style.height = h + "px";
            document.querySelector("#GameVideo").style.width = w + "px";
            document.querySelector("#GameVideo").style.height = h + "px";
            document.querySelector("#UpperCanvas").style.width = w + "px";
            document.querySelector("#UpperCanvas").style.height = h + "px";
        }
        setInterval(applycanvasmode, 100);

        // support mobile ----------------------------------------------------------------
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (!isMobile) {
            return;
        }
        let i = setInterval(function () {
            if (window.fullSetupComplete) {
                let zoneStatic = document.createElement("div");
                zoneStatic.style = "position: fixed; bottom: 0; left: 0; z-index: 9999; width: 500px; height: 500px;";
                let internal = document.createElement("div");
                internal.style = "position: relative; width: 100%; height: 100%;"
                zoneStatic.appendChild(internal);
                let joystick = nipplejs.create({
                    mode: 'semi',
                    zone: internal,
                    color: 'red',
                    catchDistance: 30
                });
                setTimeout(function () {
                    joystick.on("dir", function (e, data) {
                        let dirs = ["up", "down", "left", "right"];
                        for (let o of dirs) {
                            if (o !== data.direction.angle) {
                                fakeInput.up(o);
                            } else {
                                fakeInput.down(o);
                            }
                        }
                    });
                    joystick.on("end", function () {
                        let dirs = ["up", "down", "left", "right"];
                        for (let o of dirs) {
                            fakeInput.up(o);
                        }
                    });
                }, 100);
                document.body.appendChild(zoneStatic);
                const createButton = (text, key, bottom, right, bgColor) => {
                    let button = document.createElement("div");
                    button.style = `
                    position: fixed; 
                    bottom: ${bottom}; 
                    right: ${right}; 
                    width: 10vw; 
                    height: 10vw; 
                    background: ${bgColor}; 
                    color: white; 
                    touch-action: none; 
                    z-index: 999999; 
                    display: flex; 
                    align-items: center; 
                    justify-content: center; 
                    font-family: sans-serif; 
                    font-size: 3vw;
                    border-radius: 50%;
                `;
                    button.innerText = text;
                    button.addEventListener("touchstart", function (e) {
                        e.preventDefault();
                        fakeInput.down(key);
                    });
                    button.addEventListener("touchend", function (e) {
                        e.preventDefault();
                        fakeInput.up(key);
                    });
                    document.body.appendChild(button);
                    return button;
                };

                createButton("OK", "ok", "5vw", "5vw", "#0f08");
                createButton("ESC", "escape", "5vw", "15vw", "#f008");
                createButton("TAG", "tag", "15vw", "15vw", "#00f8");
                createButton("RUN", "shift", "15vw", "5vw", "#f0f8");
                clearInterval(i);
            }
        }, 100);
        })();
