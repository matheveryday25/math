    <script>
        const BASE = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/pneumonoultramicroscopicsilicovolcanoconiosis/";
        const ASSETS = {

            "Build/,.framework.js": 1,

        const loading = document.querySelector("#loading");
        const loadingText = document.querySelector("#loading-text");
        const progressBar = document.querySelector("#progress-bar");
        let unityInst = null;
        async function fetchAsset(path, count) {
            const chunks = [];
            for (let i = 0; i < count; i++) {
                const url = BASE + path + (count > 1 ? i.toString().padStart(2, "0") : "");
                chunks.push(fetch(url).then(r => {
                    if (!r.ok) throw new Error("Load failed: " + url);
                    return r.arrayBuffer();
                }));
            }
            const parts = await Promise.all(chunks);
            const type = path.endsWith(".js") ? "application/javascript" : "application/octet-stream";
            return new Blob(parts, { type });
        }
        async function start() {
            const keys = Object.keys(ASSETS);
            const total = keys.length;
            let loadedCount = 0;
            const results = {};
            const update = (p) => {
                const pct = Math.round(p * 100);
                loadingText.textContent = `loading ${pct}%`;
                progressBar.style.width = `${pct}%`;
            };
            await Promise.all(keys.map(async key => {
                results[key] = await fetchAsset(key, ASSETS[key]);
                loadedCount++;
                update((loadedCount / total) * 0.4);
            }));
            const config = {
                dataUrl: URL.createObjectURL(results["Build/,.data"]),
                frameworkUrl: URL.createObjectURL(results["Build/,.framework.js"]),
                codeUrl: URL.createObjectURL(results["Build/,.wasm"]),
                streamingAssetsUrl: "StreamingAssets",
                companyName: "SadColoredStudios",
                productName: "pneumonoultramicroscopicsilicovolcanoconiosis",
                productVersion: "2.0.0",
            };
            const script = document.createElement("script");
            script.src = URL.createObjectURL(results["Build/,.loader.js"]);
            script.onload = () => {
                createUnityInstance(canvas, config, (p) => {
                    update(0.4 + p * 0.6);
                }).then(i => {
                    unityInst = i;
                    loading.style.opacity = "0";
                    setTimeout(() => loading.style.display = "none", 500);
                });
            };
            document.body.appendChild(script);
        }
        start();
    </script>
