<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Flying Gorilla - UNBL0CKEDZ0NE</title>
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/TemplateData/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/TemplateData/style.css">
    <style>
      body { background-color: #231f20; margin: 0; padding: 0; overflow: hidden; }
      #unity-container { width: 100%; height: 100%; position: absolute; }
      #loading-text { color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div id="loading-text">LOADING... 0.00 MB / 70.87 MB</div>
    
    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="540" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>

    <script>
      const loadingText = document.querySelector("#loading-text");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      let loadedBytes = 0;
      const mbTotal = '70.87';

      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        let chunks = [];
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);
          
          let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
          loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
          // Sync the visual progress bar with the manual download
          progressBarFull.style.width = Math.min((loadedBytes / (70.87 * 1024 * 1024)) * 100, 100) + "%";
        }

        let fullBuffer = new Uint8Array(received);
        let offset = 0;
        for (let chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }
        return fullBuffer.buffer;
      }

      async function mergeFiles(fileParts) {
        const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
        const mergedBlob = new Blob(buffers);
        return URL.createObjectURL(mergedBlob);
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }

      (async () => {
        // 1. Download fragmented assets
        const [dataUrl, wasmUrl] = await Promise.all([
          mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/Build/vb.data", 1, 2)),
          mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/Build/vb.wasm", 1, 2)),
        ]);

        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");

        // 2. Setup Unity Configuration (FIXED URLS)
        const loaderUrl = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/Build/vb.loader.js";
        const config = {
          arguments: [],
          dataUrl: dataUrl,
          frameworkUrl: "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/gorilla/Build/vb.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "UNBL0CKEDZ0NE",
          productName: "Flying Gorilla",
          productVersion: "1.0",
        };

        // Mobile scaling
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          var meta = document.createElement('meta');
          meta.name = 'viewport';
          meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
          document.getElementsByTagName('head')[0].appendChild(meta);
        }

        // 3. Inject Loader and Initialize Instance
        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            // This updates the bar during the actual engine bootup phase
            progressBarFull.style.width = 100 * progress + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            loadingText.remove();
          }).catch((message) => {
            alert("Unity Error: " + message);
          });
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
