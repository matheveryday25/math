<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Antidisestablishmentanarisanism | UNBL0CKEDZ0NE</title>
    <link
      rel="icon"
      href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/Antidisestablishmentarianism/favicon.ico"
    />
    <link
      rel="shortcut icon"
      href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/Antidisestablishmentarianism/favicon.ico"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        background: #111;
        color: #ddd;
      }

      #unity-wrap {
        width: 100%;
        height: 100%;
        background: #000;
        position: relative;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
      }

      #overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
      }

      #loading-card {
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 20px;
        width: min(420px, 90%);
        display: grid;
        gap: 10px;
      }

      #loading-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #loading-header .label {
        font-size: 13px;
        color: #bbb;
      }

      #pct {
        font-size: 13px;
        color: #888;
        font-variant-numeric: tabular-nums;
      }

      #status {
        font-size: 12px;
        color: #666;
      }

      #bar {
        height: 4px;
        background: #222;
        border-radius: 2px;
        overflow: hidden;
      }

      #bar-fill {
        height: 100%;
        width: 0%;
        background: #555;
        transition: width 120ms linear;
      }

      @media (prefers-reduced-motion: reduce) {
        #bar-fill {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="unity-wrap">
      <canvas id="unity-canvas" tabindex="-1"></canvas>

      <div id="overlay">
        <div id="loading-card">
          <div id="loading-header">
            <span class="label">Loading</span>
            <span id="pct">0%</span>
          </div>
          <div id="bar"><div id="bar-fill"></div></div>
          <div id="status">Preparing…</div>
        </div>
      </div>
    </div>

    <script>
      const cdnBase =
        "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/Antidisestablishmentarianism/";
      const buildUrl = cdnBase + "Build";
      const loaderUrl = buildUrl + "/antidis.loader.js";

      const canvas = document.querySelector("#unity-canvas");
      const overlay = document.querySelector("#overlay");
      const statusEl = document.querySelector("#status");
      const pctEl = document.querySelector("#pct");
      const barFill = document.querySelector("#bar-fill");

      function setProgress(p) {
        const c = Math.max(0, Math.min(1, p));
        barFill.style.width = (c * 100).toFixed(1) + "%";
        pctEl.textContent = Math.round(c * 100) + "%";
      }

      function formatBytes(bytes) {
        const units = ["B", "KB", "MB", "GB"];
        let u = 0,
          v = bytes;
        while (v >= 1024 && u < units.length - 1) {
          v /= 1024;
          u++;
        }
        return `${v.toFixed(u === 0 ? 0 : 1)} ${units[u]}`;
      }

      async function fetchSplitToObjectUrl({
        urlPrefix,
        partCount,
        mimeType,
        onProgress,
      }) {
        const chunks = [];
        let downloaded = 0;
        for (let i = 0; i < partCount; i++) {
          const url = `${urlPrefix}.${String(i).padStart(2, "0")}`;
          const res = await fetch(url, { cache: "force-cache" });
          if (!res.ok)
            throw new Error(
              `Failed to fetch ${url}: ${res.status} ${res.statusText}`,
            );
          const buf = await res.arrayBuffer();
          downloaded += buf.byteLength;
          chunks.push(buf);
          onProgress?.({ downloaded });
        }
        return URL.createObjectURL(new Blob(chunks, { type: mimeType }));
      }

      const config = {
        dataUrl: "",
        frameworkUrl: buildUrl + "/antidis.framework.js",
        codeUrl: "",
        streamingAssetsUrl: buildUrl + "/StreamingAssets",
        companyName: "antidisestablishmentanarisanism",
        productName: "antidisestablishmentanarisanism",
        productVersion: "antidisestablishmentanarisanism",
      };

      (async () => {
        statusEl.textContent = "Downloading…";
        setProgress(0.01);

        const dataSizeHint = 33088400;
        const wasmSizeHint = 17932481;
        const totalBytes = dataSizeHint + wasmSizeHint;
        
        let dataDownloaded = 0;
        let wasmDownloaded = 0;

        function refreshProgress() {
          const dl = dataDownloaded + wasmDownloaded;
          statusEl.textContent = `${formatBytes(dl)} / ${formatBytes(totalBytes)}`;
          setProgress(Math.min(0.75, totalBytes > 0 ? (dl / totalBytes) * 0.75 : 0.02));
        }

        const [dataObjectUrl, wasmObjectUrl] = await Promise.all([
          fetchSplitToObjectUrl({
            urlPrefix: buildUrl + "/antidis.data",
            partCount: 4,
            mimeType: "application/octet-stream",
            onProgress: ({ downloaded }) => {
              dataDownloaded = downloaded;
              refreshProgress();
            },
          }),
          fetchSplitToObjectUrl({
            urlPrefix: buildUrl + "/antidis.wasm",
            partCount: 2,
            mimeType: "application/wasm",
            onProgress: ({ downloaded }) => {
              wasmDownloaded = downloaded;
              refreshProgress();
            },
          }),
        ]);

        config.dataUrl = dataObjectUrl;
        config.codeUrl = wasmObjectUrl;

        statusEl.textContent = "Starting engine…";
        setProgress(0.78);

        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = loaderUrl;
          script.async = true;
          script.onload = resolve;
          script.onerror = () =>
            reject(new Error(`Failed to load ${loaderUrl}`));
          document.body.appendChild(script);
        });

        try {
          await createUnityInstance(
            canvas,
            config,
            (progress) => {
              setProgress(0.78 + Math.max(0, Math.min(1, progress)) * 0.22);
              statusEl.textContent = "Initializing…";
            },
          );
          overlay.style.display = "none";
        } catch (e) {
          console.error(e);
          statusEl.textContent = "Failed to start. Check console for details.";
          setProgress(1);
          alert(e?.message || String(e));
        }
      })();
    </script>
  </body>
</html>
