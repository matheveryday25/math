    <script>
        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        window.addEventListener('resize', resizeGameContainer);

        function resizeGameContainer() {
            const container = document.getElementById('gameContainer');
            if (container) {
                const width = window.innerWidth;
                const height = window.innerHeight;
                container.style.width = `${width}px`;
                container.style.height = `${height}px`;
            }
        }

        window.onload = function () {
            resizeGameContainer();

            Promise.all([
                mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slope/Build/WEB1.2.1.data.unityweb", 1, 2))
            ]).then(([dataUrl]) => {
                let json = {
                    companyName: "Slope Plus",
                    productName: "Slope Plus",
                    dataUrl: dataUrl,
                    wasmCodeUrl: "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slope/Build/WEB1.2.1.wasm.code.unityweb",
                    wasmFrameworkUrl: "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slope/Build/WEB1.2.1.wasm.framework.unityweb",
                    TOTAL_MEMORY: 268435456,
                    graphicsAPI: ["WebGL 2.0", "WebGL 1.0"],
                    webglContextAttributes: {
                        preserveDrawingBuffer: false
                    },
                    splashScreenStyle: "Dark",
                    backgroundColor: "#000000"
                }
                let blob = new Blob([JSON.stringify(json)], {
                    type: 'application/json'
                });
                let blobUrl = URL.createObjectURL(blob);
                UnityLoader.instantiate("gameContainer", json, {
                    onProgress: UnityProgress,
                    url: blobUrl
                });
            });
        };
