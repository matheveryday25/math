<body>
    <div id="gameContainer"></div>

    <script>
      // The base URL for your CDN
      var cdnBase = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/snow/";

      var gameInstance = UnityLoader.instantiate("gameContainer", cdnBase + "game.json", {
          onProgress: UnityProgress,
          Module: {
              splashScreenStyle: "Dark",
              // Logo URL for the loading screen
              progressLogoUrl: "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/UNBL0CKEDZ0NE%20in%20Text.png",
              
              // CDN Redirect Logic
              resolveBuildUrl: function(url) {
                  return url.indexOf("://") !== -1 ? url : cdnBase + url;
              },
              
              onRuntimeInitialized: function() {
                  UnityProgress(gameInstance, "complete");
              }
          }
      });
    </script>
</body>
