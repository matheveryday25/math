<script>
/* ============================================================
   CONFIG  —  CDN adresini doldurun
   ============================================================ */
var CDN = "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/bhop/Build";   /* <-- degistir */

var LOADER    = "f2d439c40430b2f9ae804449b03b5e5b";
var DATA_FILE = "b8181f262369a6bf3089d895b5d32586";
var FRAMEWORK = "dcfe935f79be52697b571b1448461520";
var WASM_FILE = "0201508d745b324b5b1459f0c1d7b89c";

/* Data: 22.8MB -> 3 part  |  WASM: 46MB -> 6 part */
var DATA_PARTS = 3;
var WASM_PARTS = 6;

/* ============================================================ */
var canvas          = document.querySelector("#unity-canvas");
var progressBarFull = document.querySelector("#unity-progress-bar-full");
var loaderLabel     = document.querySelector("#loader-label");
var myGameInstance  = null;
var leaderboard     = null;
var player          = null;
var ysdk            = null;
var isYsdkInitialize = false;
var isDeletedGarbage = false;

/* Mobile ölçek */
function isMobileLike() {
  if (navigator.userAgentData && 'mobile' in navigator.userAgentData) return navigator.userAgentData.mobile;
  if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return true;
  if (/Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent||'')) return true;
  return Math.min(screen.width, screen.height) <= 820;
}
var nativeDPR = window.devicePixelRatio || 1;
var dpr = isMobileLike() ? Math.min(0.85 * nativeDPR, nativeDPR) : Math.min(1 * nativeDPR, nativeDPR);

canvas.style.background = "center / cover";

/* ── PART İNDİRME ─────────────────────────────────────────── */
async function fetchParts(baseUrl, partCount, label) {
  var parts = [];
  for (var i = 0; i < partCount; i++) {
    loaderLabel.textContent = label + ' ' + (i+1) + '/' + partCount + '...';
    var r = await fetch(baseUrl + '.part' + i);
    if (!r.ok) throw new Error('part' + i + ': HTTP ' + r.status);
    parts.push(new Uint8Array(await r.arrayBuffer()));
  }
  var total = parts.reduce(function(s,p){ return s + p.length; }, 0);
  var merged = new Uint8Array(total);
  var off = 0;
  for (var j = 0; j < parts.length; j++) { merged.set(parts[j], off); off += parts[j].length; }
  return merged;
}

function brotliBlobUrl(uint8, filename) {
  var blob = new Blob([uint8], { type: 'application/octet-stream' });
  return URL.createObjectURL(blob) + '#' + encodeURIComponent(filename);
}

/* ── UNITY YÜKLE ──────────────────────────────────────────── */
var script = document.createElement("script");
script.src = CDN + "/" + LOADER + ".loader.js";
script.onload = async function() {
  try {
    loaderLabel.textContent = "Downloading game data...";
    var dataBytes = await fetchParts(CDN + "/" + DATA_FILE + ".data.br", DATA_PARTS, "Data");
    var wasmBytes = await fetchParts(CDN + "/" + WASM_FILE + ".wasm.br", WASM_PARTS, "WASM");

    var config = {
      dataUrl:            brotliBlobUrl(dataBytes, DATA_FILE + ".data.br"),
      frameworkUrl:       CDN + "/" + FRAMEWORK + ".framework.js",
      codeUrl:            brotliBlobUrl(wasmBytes,  WASM_FILE + ".wasm.br"),
      streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@latest/bhop/StreamingAssets",
      companyName:        "Kot Games",
      productName:        "Surf GO",
      productVersion:     "3.411",
      devicePixelRatio:   dpr
    };

    loaderLabel.textContent = "Starting...";
    createUnityInstance(canvas, config, function(progress){
      progressBarFull.style.width = (100 * progress) + '%';
    }).then(function(inst){
      myGameInstance = inst;
      myGameInstance.SendMessage("Yandex WebGL","InitializeYandexInstance");
      if (!isDeletedGarbage) {
        var anim = document.getElementById("cuboid_anim");
        var bar  = document.getElementById("loading-cover");
        if (anim) anim.remove();
        if (bar)  bar.style.display = "none";
        isDeletedGarbage = true;
      }
      console.log("Unity initialized");
    }).catch(function(e){
      console.error(e);
      if (!isDeletedGarbage) {
        var c = document.getElementById("cuboid_anim");
        if (c) c.remove();
        isDeletedGarbage = true;
      }
    });

  } catch(e) {
    console.error("Load error:", e);
    loaderLabel.textContent = "Load error: " + e.message;
  }
};

/* ── SDK FONKSİYONLARI ────────────────────────────────────── */
function initYsdk() {
  console.log('Yandex SDK start initialization');
  return YaGames.init().then(function(y){
    console.log('Yandex SDK initialized');
    ysdk = y;
    return y;
  }).catch(console.error);
}

function initLeaderboard() {
  ysdk.getLeaderboards().then(function(_lb){ leaderboard = _lb; });
}

function initPlayer() {
  if (ysdk === null) {
    return initYsdk().then(function(y){
      return y.getPlayer().then(function(_p){ window.player = _p; return _p; });
    });
  } else {
    return ysdk.getPlayer().then(function(_p){ window.player = _p; return _p; });
  }
}

function checkCanShowShorcutDialog() {
  initYsdk().then(function(y){
    y.shortcut.canShowPrompt().then(function(prompt){
      if (prompt.canShow) myGameInstance.SendMessage("Yandex WebGL","ShortcutDialogCanShow");
    });
  });
}

document.body.appendChild(script);
</script>
