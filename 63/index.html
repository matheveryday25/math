<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="icon" type="image/x-icon" href="https://quantil.jsdelivr.net/gh/matheveryday25/math@main/UB.png" />
    <link rel="shortcut icon" type="https://quantil.jsdelivr.net/gh/matheveryday25/math@main/quiz/image/x-icon" href="https://quantil.jsdelivr.net/gh/matheveryday25/math@main/quiz/impossiblequiz.png" />
  </head>
  <body>
    <script src="https://quantil.jsdelivr.net/gh/matheveryday25/math@main/quiz/js/main.js"></script>
    <div id="ruffle" width="100%" height="100%"></div>
    <script src="https://quantil.jsdelivr.net/gh/matheveryday25/math@main/quiz/ruffle.js"></script>
    <script>
      window.RufflePlayer = window.RufflePlayer || {};
      window.addEventListener("load", (event) => {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        const container = document.getElementById("ruffle");
        player.id = "player";
        player.style.width = "100%";
        player.style.height = "100%";
        container.appendChild(player);
        player.load("https://quantil.jsdelivr.net/gh/matheveryday25/math@main/63/63.swf");
      });
    </script>
  </body>
</html>
