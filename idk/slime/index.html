<html lang="en-us"><head>
    <base href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/">
    <meta charset="utf-8">
    <title>Slime Rancher Decompiled v0.2.1</title>
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/TemplateData/favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/TemplateData/style.css">
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/Build/UnityLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/mobile-controls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #loading-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Open Sans', sans-serif;
            font-size: 18px;
            z-index: 9999;
        }
    </style>
</head>

<body>
    <div id="loading-text">LOADING... 0.00 MB / 54.5 MB</div>

    <div class="webgl-content">
        <div class="bg hide">
            <img class="bg" src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/TemplateData/loading_bg.png" style="width: 100%; height: 100%; padding: 0px; margin: 0px; border: 0px; position: absolute;">
        </div>
        <div id="gameContainer" style="width: 100vw; height: 100vh; padding: 0px; margin: 0px; border: 0px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/TemplateData/responsive.js"></script>

    <script>
        const ogxhr = window.XMLHttpRequest;

        function xhrfunc() {
            const xhr = new ogxhr();
            const open = xhr.open;
            xhr.open = function(method, url, ...rest) {
                if (url.includes("blob:")) {
                    return open.call(this, method, "blob:" + url.split("blob:")[1], ...rest);
                }
                return open.call(this, method, url, ...rest);
            };
            return xhr;
        }
        window.XMLHttpRequest = xhrfunc;

        const loadingText = document.querySelector("#loading-text");
        let loadedBytes = 0;

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Failed to fetch ${url}: ${response.status}`);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);

                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                if (loadingText) loadingText.innerHTML = `LOADING... ${mbDone} MB / 54.5 MB`;
            }

            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }

        async function mergeFiles(fileParts) {
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            const mergedBlob = new Blob(buffers);
            return URL.createObjectURL(mergedBlob);
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        function resizeUnityContainer() {
            var container = document.getElementById("gameContainer");
            var canvas = container.querySelector("canvas");
            container.style.width = window.innerWidth + "px";
            container.style.height = window.innerHeight + "px";
            if (canvas) {
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
        }

        (async () => {
            try {
                const [dataUrl] = await Promise.all([
                    mergeFiles(getParts("https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/Build/slimeBUILDS.data.unityweb", 1, 3)),
                ]);

                const json = {
                    "companyName": "Snubs",
                    "productName": "Slime Rancher Prototype",
                    "dataUrl": dataUrl,
                    "wasmCodeUrl": "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/Build/slimeBUILDS.wasm.code.unityweb",
                    "wasmFrameworkUrl": "https://cdn.jsdelivr.net/gh/UNBL0CKEDZ0NE/ubassets@main/slime/Build/slimeBUILDS.framework.unityweb",
                    "TOTAL_MEMORY": 536870912,
                    "graphicsAPI": ["WebGL 2.0", "WebGL 1.0"],
                    "webglContextAttributes": { "preserveDrawingBuffer": false },
                    "splashScreenStyle": "Dark"
                };

                let blob = new Blob([JSON.stringify(json)], { type: "application/json" });
                let blobUrl = URL.createObjectURL(blob);

                window.addEventListener("resize", resizeUnityContainer);

                UnityLoader.instantiate("gameContainer", json, {
                    url: blobUrl,
                    Module: {
                        onRuntimeInitialized: function() {
                            resizeUnityContainer();
                            if (loadingText) loadingText.remove();
                        },
                    },
                });
            } catch (err) {
                if (loadingText) loadingText.innerHTML = "ERROR: " + err.message;
                console.error(err);
            }
        })();
    </script>
</body></html>
